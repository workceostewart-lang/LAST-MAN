<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>LAST MAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css?v=mobile-layout-3" />
  </head>
  <body>
    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer">
      <!-- Turn Indicator -->
      <div id="turn-indicator" class="hud-element top-center">
        <div class="turn-text">Your Turn</div>
        <div class="direction-arrow">↻</div>
      </div>

      <!-- Draw Pile Info (Placeholder visual, real pile is 3D) -->
      <div id="draw-info" class="hud-element top-left">
        Cards left: <span id="draw-count">0</span>
      </div>

      <div id="game-message" class="hud-element message-center hidden" role="status" aria-live="polite"></div>

      <!-- Theme Selector -->
      <div id="settings-btn" class="hud-element top-right">
        ⚙️ Settings
      </div>

      <!-- Player Status -->
      <div id="player-status" class="hud-element" style="top: 80px; right: 24px; display: flex; flex-direction: column; gap: 6px; font-size: 0.9rem; text-transform: none;"></div>

      <!-- Last Card Badge -->
      <button id="last-card-btn" class="hud-element hidden pulsing">
        LAST MAN!
      </button>

      <button id="pass-btn" class="hud-element bottom-center hidden">Pass</button>

      <!-- Color Picker Modal -->
      <div id="color-picker" class="modal hidden">
        <div class="modal-content">
          <h2>Choose Next Color</h2>
          <div class="color-options">
            <button class="color-btn" data-color="red" style="background: var(--color-red)"></button>
            <button class="color-btn" data-color="blue" style="background: var(--color-blue)"></button>
            <button class="color-btn" data-color="green" style="background: var(--color-green)"></button>
            <button class="color-btn" data-color="yellow" style="background: var(--color-yellow)"></button>
          </div>
        </div>
      </div>

      <!-- End Screen Modal -->
      <div id="end-screen" class="modal hidden">
        <div class="modal-content text-center">
          <h1 id="winner-text">You Win!</h1>
          <p id="score-text">Score: 500</p>
          <button id="restart-btn" class="primary-btn">Play Again</button>
        </div>
      </div>

      <!-- Settings Modal -->
      <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
          <h2>Settings</h2>
          
          <div class="setting-row">
            <label>Theme</label>
            <select id="theme-selector">
              <option value="premium">Premium/Modern</option>
              <option value="cartoon">Cartoon</option>
              <option value="neon">Neon/Cyberpunk</option>
              <option value="retro">Retro Arcade</option>
            </select>
          </div>

          <div class="setting-row">
            <label>Sound</label>
            <input type="checkbox" id="sound-toggle" checked />
          </div>

          <div class="setting-row">
            <label for="player-count">Players</label>
            <select id="player-count">
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4" selected>4</option>
            </select>
          </div>

          <div class="setting-row">
            <label for="cpu-difficulty">CPU</label>
            <select id="cpu-difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>

          <div class="setting-row">
            <label for="cpu-personality">Personality</label>
            <select id="cpu-personality">
              <option value="balanced" selected>Balanced</option>
              <option value="aggressive">Aggressive</option>
              <option value="defensive">Defensive</option>
            </select>
          </div>

          <div class="setting-row">
            <label for="game-mode">Mode</label>
            <select id="game-mode">
              <option value="quickPlay" selected>Quick Play</option>
              <option value="matchMode">Best of 3</option>
              <option value="scoreTarget">First to 500</option>
            </select>
          </div>

          <div class="setting-row">
            <label for="stacking-toggle">Stack draws</label>
            <input type="checkbox" id="stacking-toggle" />
          </div>

          <button id="new-game-btn" class="primary-btn mt-2">Start New Game</button>

          <button id="close-settings-btn" class="primary-btn mt-2">Close</button>
        </div>
      </div>

    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
